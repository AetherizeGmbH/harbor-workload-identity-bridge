name: codeql

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly re-scan so newly published CodeQL queries run against an
    # unchanged main between releases (Mon 06:00 UTC).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # Lets CodeQL publish findings to the repo's Security tab.
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Pin the toolchain to go.mod so autobuild uses the same Go (go1.26)
      # the rest of CI builds with, instead of the runner's default.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
      - name: Analyze
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:go"
