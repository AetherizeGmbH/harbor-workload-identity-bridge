name: e2e

on:
  pull_request:
    branches: [main]
    paths:
      - "bridge/**"
      - "plugin/**"
      - "charts/harbor-bridge/**"
      - "test/e2e/**"
      - "Dockerfile.*"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tofu-e2e:
    name: tofu test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2
        # 1.12+ allows function calls (base64encode, etc.) inside string
        # interpolations within run-block `variables` heredocs. 1.8.5
        # rejected them with "Function calls not allowed". Pinned to
        # match what brew installs locally.
        with: { tofu_version: 1.12.0 }
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with: { version: v4.2.0 }
      # No separate docker build step: the tofu test harness's
      # `build_images` run block (modules/docker-build) shells out to
      # `docker build` for bridge + plugin before the kind cluster
      # tries to load them.
      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          install_only: true   # we want the binary; cluster is created by tofu
          # Must be >= v0.25 to parse containerd 2.x's `ctr plugins ls`
          # output (kindest/node:v1.35.0 ships containerd 2.x). v0.24
          # silently fails snapshotter detection here. Pinned to v0.32
          # to match what brew installs on developer machines.
          version: v0.32.0
      - name: Run tofu test
        working-directory: test/e2e
        # Explicit pipefail: the github-hosted runner's effective shell
        # here is `/usr/bin/bash -e {0}` (no `-o pipefail`), so `tofu
        # test ... | tee ...` returned tee's exit code (0) and a real
        # tofu failure looked green. -E inherits ERR traps; -u catches
        # accidentally-unset variables.
        shell: bash
        run: |
          set -Eeuo pipefail
          tofu init
          TF_VAR_pause_before_pull=false tofu test -verbose 2>&1 | tee /tmp/tofu-test.log
      - name: Capture cluster diagnostics on failure
        # Runs BEFORE the cleanup happens, so we still see the actual
        # pod state, kubelet logs, and bridge metrics that let us tell
        # apart "kubelet silent-abort bug" from "networking", "TLS",
        # "DNS" etc.
        if: failure()
        run: |
          set +e
          mkdir -p /tmp/diag
          for node in $(docker ps --filter "label=io.x-k8s.kind.cluster=bridge-e2e" --format "{{.Names}}"); do
            docker exec "$node" journalctl -u kubelet --no-pager -n 500 > "/tmp/diag/${node}.kubelet.log" 2>&1
            docker exec "$node" sh -c 'cat /etc/default/kubelet 2>/dev/null; ls -la /etc/kubernetes/credential-provider /etc/kubernetes/credential-provider-config 2>/dev/null' > "/tmp/diag/${node}.cred-state.log" 2>&1
          done
          kubectl get pods -A -o wide                                > /tmp/diag/pods.txt 2>&1
          kubectl describe pod -n test-pull -l app=bridge-pull-test  > /tmp/diag/pull-test.describe.txt 2>&1
          kubectl logs    -n harbor-bridge-system deploy/harbor-bridge --tail=200 > /tmp/diag/bridge.log 2>&1
          kubectl logs    -n harbor-bridge-system ds/harbor-bridge-plugin --tail=100 > /tmp/diag/plugin.log 2>&1
          kubectl -n harbor-bridge-system get events --sort-by='.lastTimestamp' > /tmp/diag/bridge-events.txt 2>&1
          kubectl -n test-pull get events --sort-by='.lastTimestamp'             > /tmp/diag/test-pull-events.txt 2>&1
      - name: Upload tofu test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tofu-test-log
          path: /tmp/tofu-test.log
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cluster-diagnostics
          path: /tmp/diag/
