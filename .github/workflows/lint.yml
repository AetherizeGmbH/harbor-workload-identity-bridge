name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          # v2 series of golangci-lint is built with newer Go (the v1
          # series was stuck on go1.23/1.24, refused to load our go1.26
          # source). Action v7 is the first to accept linter v2.
          # Renovate's github-actions manager will bump both deterministically.
          version: v2.12.2
          args: --timeout=5m

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with: { go-version-file: go.mod }
      - run: |
          out=$(gofmt -l -s .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            gofmt -d -s .
            exit 1
          fi

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with: { version: v4.2.1 }
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-complete.yaml
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-mtls.yaml

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2
        # Match e2e.yml's pin: same major fmt rules, no laptop/CI drift.
        with: { tofu_version: 1.12.0 }
      - run: tofu fmt -check -recursive test/e2e || (echo "run 'tofu fmt -recursive test/e2e' locally" && exit 1)

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: |
          pip install --user yamllint
          # No --strict: warnings (e.g. one shell command that runs
          # over our 200-char soft limit in e2e.yml) shouldn't fail
          # CI. key-duplicates remains an `error` rule and so still fails.
          ~/.local/bin/yamllint -c .yamllint.yml .github/workflows charts/harbor-bridge
