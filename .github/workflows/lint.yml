name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          # v2 series of golangci-lint is built with newer Go (the v1
          # series was stuck on go1.23/1.24, refused to load our go1.26
          # source). Action v7 is the first to accept linter v2.
          # Renovate's github-actions manager will bump both deterministically.
          version: v2.12.2
          args: --timeout=5m

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with: { go-version-file: go.mod }
      - run: |
          out=$(gofmt -l -s .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            gofmt -d -s .
            exit 1
          fi

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with: { version: v4.2.3 }
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-complete.yaml
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-mtls.yaml

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
        # Match e2e.yml's pin: same major fmt rules, no laptop/CI drift.
        with: { tofu_version: 1.12.0 }
      - run: tofu fmt -check -recursive test/e2e || (echo "run 'tofu fmt -recursive test/e2e' locally" && exit 1)

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: |
          pip install --user yamllint
          # No --strict: warnings (e.g. one shell command that runs
          # over our 200-char soft limit in e2e.yml) shouldn't fail
          # CI. key-duplicates remains an `error` rule and so still fails.
          ~/.local/bin/yamllint -c .yamllint.yml .github/workflows charts/harbor-bridge

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [Dockerfile.bridge, Dockerfile.plugin]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Static-checks the workflows themselves: shellcheck on run: blocks,
      # ${{ }} expression typing, and invalid action inputs. Runs as the
      # upstream Docker image (digest-pinned; Renovate keeps tag+digest fresh).
      - uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
