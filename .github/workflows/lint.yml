name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout=5m

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: |
          out=$(gofmt -l -s .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            gofmt -d -s .
            exit 1
          fi

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.16.1 }
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-complete.yaml
      - run: helm lint charts/harbor-bridge -f charts/harbor-bridge/tests/values-mtls.yaml

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with: { tofu_version: 1.8.5 }
      - run: tofu fmt -check -recursive test/e2e || (echo "run 'tofu fmt -recursive test/e2e' locally" && exit 1)

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install --user yamllint
          ~/.local/bin/yamllint -c .yamllint.yml -s .github/workflows charts/harbor-bridge
