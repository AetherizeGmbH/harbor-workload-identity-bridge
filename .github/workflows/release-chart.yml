name: release-chart

# Publishes the Helm chart as an OCI artifact to ghcr.io. We do NOT use
# helm/chart-releaser-action + gh-pages: the org enforces GitHub's
# "Immutable Releases" policy, which fails chart-releaser's
# create-release-then-upload-asset flow with HTTP 422 "Cannot upload
# assets to an immutable release". OCI sidesteps GitHub Releases
# entirely and puts the chart next to the images in ghcr.io.
#
# Users install via:
#   helm install harbor-bridge \
#     oci://ghcr.io/aetherizegmbh/charts/harbor-workload-identity-bridge \
#     --version X.Y.Z -f values.yaml

on:
  workflow_dispatch:
    inputs:
      version:
        description: Chart + appVersion (from semantic-release). Without leading v.
        required: true
        type: string

permissions:
  contents: read
  packages: write  # OCI push to ghcr.io

concurrency:
  # Per-version so backfills don't queue against each other.
  group: release-chart-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  push:
    name: helm OCI push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with: { version: v4.2.1 }
      - name: Set chart version + appVersion
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^version: .*/version: ${VERSION}/" charts/harbor-bridge/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/harbor-bridge/Chart.yaml
          head charts/harbor-bridge/Chart.yaml
      - name: Package chart
        run: helm package charts/harbor-bridge --destination /tmp
      - name: Login to ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Lowercased owner: ghcr.io is case-insensitive at the registry
        # layer but the OCI spec mandates lowercase for namespaces.
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=$OWNER_LC" >> "$GITHUB_ENV"
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin
      - name: Push to OCI
        env:
          VERSION: ${{ inputs.version }}
        run: |
          helm push "/tmp/harbor-workload-identity-bridge-${VERSION}.tgz" \
            "oci://ghcr.io/${OWNER_LC}/charts"
