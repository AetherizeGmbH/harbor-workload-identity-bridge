name: release-images

on:
  # PRIMARY trigger: explicit dispatch from release.yml after
  # semantic-release succeeds. The `tag` input is the semver string
  # without leading `v`. Reason for not using `on: push: tags`:
  # semantic-release pushes the tag with GITHUB_TOKEN, and GitHub's
  # security model suppresses workflow triggers for GITHUB_TOKEN-pushed
  # events — so `push: tags` would silently never fire on releases.
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (without leading v). For ad-hoc rebuilds.
        required: true
        type: string
  # FALLBACK trigger: manual tag pushes from a developer's machine (e.g.,
  # rebuilding an existing release after a Dockerfile fix). Will not fire
  # from semantic-release's tag pushes, see above.
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  # Group by tag so independent versions don't queue against each other.
  # If we grouped by github.ref, dispatching three orphan-rebuilds in
  # parallel would let GitHub drop all-but-newest queued runs.
  group: release-images-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Matrix carries (component, image) per row. The bridge image is
      # the project's primary artifact and gets the bare project name;
      # the plugin gets the `-plugin` suffix. Previously this template
      # was `harbor-workload-identity-bridge-${component}` which
      # produced the silly `harbor-workload-identity-bridge-bridge`
      # for the bridge image — fixed here.
      matrix:
        include:
          - component: bridge
            image: harbor-workload-identity-bridge
          - component: plugin
            image: harbor-workload-identity-bridge-plugin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Resolve tag + lowercase owner
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from refs/tags/vX.Y.Z
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
          # OCI namespaces must be lowercase per spec; org name "AetherizeGmbH"
          # would 404 on `docker pull` for case-sensitive clients.
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ steps.tag.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          provenance: true
          sbom: true
