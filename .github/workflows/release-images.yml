name: release-images

on:
  # Sole trigger: explicit dispatch from release.yml after semantic-release
  # succeeds, plus the same input for ad-hoc rebuilds. The `tag` input is the
  # semver string without leading `v`. We deliberately do NOT add
  # `on: push: tags`: semantic-release now pushes the tag as the release
  # GitHub App, which WOULD satisfy push-tags (App pushes aren't recursion-
  # suppressed like GITHUB_TOKEN) — but it would race a duplicate build
  # against the dispatch. One dispatch path keeps every build gated on a real
  # release, deterministic, and idempotent.
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (without leading v). For ad-hoc rebuilds.
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  # Group by tag so independent versions don't queue against each other.
  # If we grouped by github.ref, dispatching three orphan-rebuilds in
  # parallel would let GitHub drop all-but-newest queued runs.
  group: release-images-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Matrix carries (component, image) per row. The bridge image is
      # the project's primary artifact and gets the bare project name;
      # the plugin gets the `-plugin` suffix. Previously this template
      # was `harbor-workload-identity-bridge-${component}` which
      # produced the silly `harbor-workload-identity-bridge-bridge`
      # for the bridge image — fixed here.
      matrix:
        include:
          - component: bridge
            image: harbor-workload-identity-bridge
          - component: plugin
            image: harbor-workload-identity-bridge-plugin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Resolve tag + lowercase owner
        id: tag
        run: |
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          # OCI namespaces must be lowercase per spec; org name "AetherizeGmbH"
          # would 404 on `docker pull` for case-sensitive clients.
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ steps.tag.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          # SLSA build provenance stays on (BuildKit attestation). The SBOM
          # is produced by Trivy instead of BuildKit's syft generator and
          # attached as a cosign attestation below, so `sbom: true` is off
          # here to avoid two competing SBOM attestations on the same image.
          provenance: true
          sbom: false

      # Keyless signing + SBOM attestation, both via Sigstore (Fulcio for
      # short-lived certs, Rekor transparency log). Uses the workflow's
      # GitHub OIDC token — no long-lived keys. Everything binds to the
      # immutable image digest (not a mutable tag) so signatures can't be
      # swapped onto a different image later.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless)
        env:
          IMAGE: ghcr.io/${{ steps.tag.outputs.owner_lc }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Trivy reads the image straight from ghcr.io using the docker login
      # credentials already set up above. CycloneDX is the predicate format
      # cosign attests against. Note: for a multi-arch index Trivy resolves a
      # single platform (linux/amd64) for the component listing.
      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: latest
          scan-type: image
          image-ref: ghcr.io/${{ steps.tag.outputs.owner_lc }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attest SBOM (keyless)
        env:
          IMAGE: ghcr.io/${{ steps.tag.outputs.owner_lc }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "${IMAGE}@${DIGEST}"
