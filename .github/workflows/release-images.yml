name: release-images

on:
  # Fires after `release.yml` (semantic-release) succeeds and tags the
  # repo. We use the tag as the image tag so the chart's `appVersion`
  # (semantic-release also bumps Chart.yaml) lines up 1:1 with the
  # docker image tag operators pull.
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (without leading v). For ad-hoc rebuilds.
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [bridge, plugin]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from refs/tags/vX.Y.Z
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/harbor-workload-identity-bridge-${{ matrix.component }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ matrix.component == 'bridge' || matrix.component == 'plugin' }}
          labels: |
            org.opencontainers.image.title=harbor-workload-identity-bridge-${{ matrix.component }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          provenance: true
          sbom: true
