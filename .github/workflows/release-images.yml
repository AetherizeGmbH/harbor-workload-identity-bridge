name: release-images

on:
  # PRIMARY trigger: explicit dispatch from release.yml after
  # semantic-release succeeds. The `tag` input is the semver string
  # without leading `v`. Reason for not using `on: push: tags`:
  # semantic-release pushes the tag with GITHUB_TOKEN, and GitHub's
  # security model suppresses workflow triggers for GITHUB_TOKEN-pushed
  # events — so `push: tags` would silently never fire on releases.
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (without leading v). For ad-hoc rebuilds.
        required: true
        type: string
  # FALLBACK trigger: manual tag pushes from a developer's machine (e.g.,
  # rebuilding an existing release after a Dockerfile fix). Will not fire
  # from semantic-release's tag pushes, see above.
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  # Group by tag so independent versions don't queue against each other.
  # If we grouped by github.ref, dispatching three orphan-rebuilds in
  # parallel would let GitHub drop all-but-newest queued runs.
  group: release-images-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [bridge, plugin]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from refs/tags/vX.Y.Z
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/harbor-workload-identity-bridge-${{ matrix.component }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ matrix.component == 'bridge' || matrix.component == 'plugin' }}
          labels: |
            org.opencontainers.image.title=harbor-workload-identity-bridge-${{ matrix.component }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          provenance: true
          sbom: true
