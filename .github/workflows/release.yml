name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # tag + release
  issues: write         # semantic-release adds release-note comments
  pull-requests: write  # ditto
  actions: write        # createWorkflowDispatch for trigger-{chart-release,release-images}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in flight

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # semantic-release pushes the `chore(release)` commit back to main as
    # the GitHub App (see the token step below). Unlike GITHUB_TOKEN, an
    # App-authored push is NOT suppressed by GitHub's recursion guard, so
    # it re-triggers this very workflow. Skip that echo run: its only new
    # commit is the `chore(release)` chore, which produces no release, but
    # evaluating it still spins up a pointless job. workflow_dispatch has
    # no head_commit, so manual runs fall through the guard.
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    outputs:
      # cycjimmy/semantic-release-action sets these — npx semantic-release alone does not.
      released: ${{ steps.semrel.outputs.new_release_published }}
      version:  ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      # main's ruleset requires verified signatures and (once enabled)
      # passing status checks — neither of which semantic-release's fresh
      # direct push to main can satisfy (an unsigned commit with no prior
      # check runs). We push as this GitHub App instead and add the App to
      # the ruleset's bypass list, so the release push is exempt while
      # humans and PRs stay fully gated. Reuses the Renovate App; it needs
      # contents:write (push + create release) plus issues:write and
      # pull-requests:write (semantic-release comments on released PRs).
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with: { version: v4.2.3 }  # semantic-release prepareCmd regenerates chart goldens
      # cycjimmy/semantic-release-action exposes `new_release_published`
      # and `new_release_version` as step outputs — the bare `npx
      # semantic-release` does not, which silently broke our downstream
      # dispatch (chart-release + release-images) for v0.0.0–v0.0.5.
      - uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        id: semrel
        with:
          semantic_version: 24
          # Unpinned — old majors (notably conventionalcommits@7) ship
          # the `Date.prototype.toString called on incompatible receiver`
          # crash in conventional-changelog-writer. Let npm resolve to
          # the latest compatible majors; Renovate's npm manager keeps
          # them current.
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            conventional-changelog-conventionalcommits
        env:
          # App token (not GITHUB_TOKEN): semantic-release uses GH_TOKEN/
          # GITHUB_TOKEN both for the GitHub API and to build the
          # authenticated push URL, so this routes the bypass-eligible
          # App identity through the `git push` to main.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # release-images.yml and release-chart.yml are dispatched explicitly from
  # here, gated on a real release (released == 'true') so each fires exactly
  # once per version with the precise tag. The App-pushed tag would now also
  # satisfy `on: push: tags` (App pushes aren't recursion-suppressed like
  # GITHUB_TOKEN), so release-images.yml's old push-tags fallback was removed
  # to avoid a duplicate build racing this dispatch — manual rebuilds use its
  # workflow_dispatch input instead.
  trigger-chart-release:
    name: Trigger chart-release
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch chart-release workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-chart.yml',
              ref: 'main',
              inputs: { version: '${{ needs.release.outputs.version }}' },
            });

  trigger-images-release:
    name: Trigger release-images
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release-images workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-images.yml',
              ref: 'main',
              inputs: { tag: '${{ needs.release.outputs.version }}' },
            });
