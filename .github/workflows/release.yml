name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # tag + release
  issues: write         # semantic-release adds release-note comments
  pull-requests: write  # ditto

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in flight

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel.outputs.new_release_published }}
      version:  ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/exec \
            @semantic-release/github \
            conventional-changelog-conventionalcommits
      - name: Run semantic-release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  trigger-chart-release:
    name: Trigger chart-release
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch chart-release workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-chart.yml',
              ref: 'main',
              inputs: { version: '${{ needs.release.outputs.version }}' },
            });
