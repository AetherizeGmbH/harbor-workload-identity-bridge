name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # tag + release
  issues: write         # semantic-release adds release-note comments
  pull-requests: write  # ditto
  actions: write        # createWorkflowDispatch for trigger-{chart-release,release-images}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in flight

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    outputs:
      # cycjimmy/semantic-release-action sets these — npx semantic-release alone does not.
      released: ${{ steps.semrel.outputs.new_release_published }}
      version:  ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with: { version: v4.2.0 }  # semantic-release prepareCmd regenerates chart goldens
      # cycjimmy/semantic-release-action exposes `new_release_published`
      # and `new_release_version` as step outputs — the bare `npx
      # semantic-release` does not, which silently broke our downstream
      # dispatch (chart-release + release-images) for v0.0.0–v0.0.5.
      - uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        id: semrel
        with:
          semantic_version: 24
          # Unpinned — old majors (notably conventionalcommits@7) ship
          # the `Date.prototype.toString called on incompatible receiver`
          # crash in conventional-changelog-writer. Let npm resolve to
          # the latest compatible majors; Renovate's npm manager keeps
          # them current.
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # release-images.yml and release-chart.yml are dispatched explicitly
  # from here. We can't rely on `on: push: tags` because semantic-release
  # pushes the tag using the default GITHUB_TOKEN, and per GitHub's
  # security model, events triggered by GITHUB_TOKEN do not create new
  # workflow runs. (See: https://docs.github.com/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow)
  trigger-chart-release:
    name: Trigger chart-release
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch chart-release workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-chart.yml',
              ref: 'main',
              inputs: { version: '${{ needs.release.outputs.version }}' },
            });

  trigger-images-release:
    name: Trigger release-images
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release-images workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-images.yml',
              ref: 'main',
              inputs: { tag: '${{ needs.release.outputs.version }}' },
            });
