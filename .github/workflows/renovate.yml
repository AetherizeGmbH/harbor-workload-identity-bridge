name: renovate

on:
  schedule:
    # Twice a day so automerge has a chance to rebase open PRs against
    # the latest main shortly after a merge. UTC is the only timezone
    # GitHub Actions cron understands; 07:00/16:00 UTC is 09:00/18:00
    # Berlin in CEST (summer) and 08:00/17:00 Berlin in CET (winter).
    - cron: "0 7,16 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options: [trace, debug, info, warn, error]
      dryRun:
        description: Dry run (no PRs created)
        default: "false"
        type: string

# Renovate uses a GitHub App installation token (minted below), not
# GITHUB_TOKEN, so the workflow's own scope only needs what
# actions/checkout requires. All branch creation, PR opening, issue
# management, and check-run reading happens via the App identity, which
# is also what makes PR-triggered workflows (lint, test, e2e) actually
# fire on Renovate PRs — events from a non-GITHUB_TOKEN identity are
# not subject to GitHub's recursion-prevention suppression.
permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false  # never cancel a renovate run

jobs:
  renovate:
    name: self-hosted renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Mint Renovate App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
      - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'true' && 'full' || '' }}
          # The action defaults to onboarding-style PRs; this repo opts in:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
