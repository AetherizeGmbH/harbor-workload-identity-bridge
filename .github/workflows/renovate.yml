name: renovate

on:
  schedule:
    - cron: "0 3 */3 * *"   # every 3 days at 03:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options: [trace, debug, info, warn, error]
      dryRun:
        description: Dry run (no PRs created)
        default: "false"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  # Renovate reads commit status + check-run state before deciding to
  # open or merge a PR. Without these, the github-actions integration
  # 403s on /commits/{ref}/status and the worker errors out as
  # `integration-unauthorized` before any PR can be ensured.
  statuses: read
  checks: read
  actions: read

concurrency:
  group: renovate
  cancel-in-progress: false  # never cancel a renovate run

jobs:
  renovate:
    name: self-hosted renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v40.3.1
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'true' && 'full' || '' }}
          # The action defaults to onboarding-style PRs; this repo opts in:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
