# golangci-lint config. Conservative on purpose — the bridge and plugin
# already have tight unit tests. Linters here catch the high-value stuff
# without drowning every PR in style complaints.
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - misspell
    - nakedret
    - nilerr
    - revive
    - unconvert
    - unparam
    - usestdlibvars

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: true
  revive:
    rules:
      - name: var-naming
      - name: receiver-naming
      - name: exported
        arguments: ["disableStutteringCheck"]
      - name: indent-error-flow
      - name: superfluous-else

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, unparam, revive]
  max-issues-per-linter: 0
  max-same-issues: 0
