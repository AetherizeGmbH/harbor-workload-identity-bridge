# golangci-lint v2 config. Conservative on purpose — the bridge and
# plugin already have tight unit tests. Linters here catch the
# high-value stuff without drowning every PR in style complaints.
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - misspell
    - nakedret
    - nilerr
    - revive
    - unconvert
    - unparam
    - usestdlibvars
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: var-naming
        - name: receiver-naming
        - name: exported
          arguments: ["disableStutteringCheck"]
        - name: indent-error-flow
        - name: superfluous-else
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, unparam, revive]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
