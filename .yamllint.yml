extends: default

rules:
  line-length:
    max: 160
    level: warning
  document-start: disable
  truthy:
    check-keys: false   # GitHub Actions uses `on:` which yamllint treats as boolean
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  charts/harbor-bridge/tests/golden/
  charts/harbor-bridge/templates/
  charts/harbor-bridge/crds/
