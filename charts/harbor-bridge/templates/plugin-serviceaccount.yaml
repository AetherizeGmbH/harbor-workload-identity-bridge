apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "harbor-bridge.plugin.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor-bridge.plugin.labels" . | nindent 4 }}
# Plugin pods do not talk to the K8s API — the binary running on the
# node makes a single HTTPS call to the bridge and exits. The SA is
# attached purely so the DaemonSet pod can mount the bridge-tls Secret
# (read-only) to pull ca.crt onto each node.
automountServiceAccountToken: false
