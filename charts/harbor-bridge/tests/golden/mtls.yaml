# Source: harbor-workload-identity-bridge/templates/bridge-certificate.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-bridge-tls
  namespace: harbor-bridge-system
  labels:
    helm.sh/chart: harbor-workload-identity-bridge-0.1.1
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: bridge
spec:
  secretName: harbor-bridge-tls
  # The plugin reads ca.crt from this Secret via the DaemonSet's
  # volume mount. cert-manager writes it by default.
  duration: 2160h     # 90d
  renewBefore: 360h   # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  subject:
    organizations: [aetherize.harbor-workload-identity-bridge]
  commonName: harbor-bridge
  dnsNames:
    - harbor-bridge
    - harbor-bridge.harbor-bridge-system
    - harbor-bridge.harbor-bridge-system.svc
    - harbor-bridge.harbor-bridge-system.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  usages:
    - server auth
    - client auth
  issuerRef:
    name: harbor-bridge-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
