    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: bridge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-workload-identity-bridge
      app.kubernetes.io/instance: harbor-bridge
      app.kubernetes.io/component: bridge
  namespaceSelector:
    matchNames:
      - harbor-bridge-system
  endpoints:
    - port: https
      scheme: https
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      tlsConfig:
        # Prometheus reaches the bridge by Service DNS, which the cert
        # covers. Operator configures the CA out-of-band.
        serverName: harbor-bridge.harbor-bridge-system.svc
        insecureSkipVerify: false
