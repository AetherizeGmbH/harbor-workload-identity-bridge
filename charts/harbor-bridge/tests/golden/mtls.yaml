# Source: harbor-workload-identity-bridge/templates/plugin-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-bridge-plugin
  namespace: harbor-bridge-system
  labels:
    helm.sh/chart: harbor-workload-identity-bridge-0.1.1
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: plugin
data:
  credential-provider-config.yaml: |
    apiVersion: kubelet.config.k8s.io/v1
    kind: CredentialProviderConfig
    providers:
      - name: harbor-bridge-plugin
        apiVersion: credentialprovider.kubelet.k8s.io/v1
        matchImages:
          - "harbor.example.com/*"
        defaultCacheDuration: "1h"
        env:
          - name: HARBOR_BRIDGE_ENDPOINT
            # Plugin runs on the node; reach the bridge via the
            # NodePort on the node's own loopback. ADR-0008.
            value: "https://127.0.0.1:31443"
          - name: HARBOR_BRIDGE_CA_BUNDLE
            value: "/etc/kubernetes/credential-provider-config/harbor-bridge-ca.crt"
          - name: HARBOR_BRIDGE_CLIENT_CERT
            value: "/etc/kubernetes/credential-provider-config/harbor-bridge-client.crt"
          - name: HARBOR_BRIDGE_CLIENT_KEY
            value: "/etc/kubernetes/credential-provider-config/harbor-bridge-client.key"
        tokenAttributes:
          serviceAccountTokenAudience: "harbor-bridge-prod-eu-west"
          requireServiceAccount: true
          # See KEP-4412: this makes the SA token + UID part of the
          # cache key so each pod gets its own credential.
          cacheType: ServiceAccount

