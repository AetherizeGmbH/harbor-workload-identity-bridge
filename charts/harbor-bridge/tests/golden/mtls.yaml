# Source: harbor-workload-identity-bridge/templates/plugin-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: harbor-bridge-plugin
  namespace: harbor-bridge-system
  labels:
    helm.sh/chart: harbor-workload-identity-bridge-0.1.1
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-workload-identity-bridge
      app.kubernetes.io/instance: harbor-bridge
      app.kubernetes.io/component: plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        helm.sh/chart: harbor-workload-identity-bridge-0.1.1
        app.kubernetes.io/version: "0.1.1"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: harbor-workload-identity-bridge
        app.kubernetes.io/name: harbor-workload-identity-bridge
        app.kubernetes.io/instance: harbor-bridge
        app.kubernetes.io/component: plugin
      annotations:
        # Force re-roll on config or CA rotation so the on-disk copies
        # are refreshed across the fleet.
        plugin.harbor.aetherize.io/config-checksum: c6d0cb766bc6571aac2a6e6ffb6574e2ccc1847c506b0b5dbc57c3ea290b269a
        plugin.harbor.aetherize.io/tls-checksum: b84f1c25e5f65271fd9a4d3d3abf7821fc2b628c31b267eb978e29c1aff84e00
    spec:
      serviceAccountName: harbor-bridge-plugin
      hostNetwork: false
      # Required so the install container's `nsenter -t 1 ...` can
      # reach the host's PID namespace to patch /etc/default/kubelet
      # and signal kubelet.service. ECR / GCR / ACR sidestep this by
      # baking everything into the cloud node image; for self-managed
      # clusters where the operator does not control the node image
      # (kind, kubeadm, k3s), this is the install handoff.
      hostPID: true
      priorityClassName: system-node-critical
      securityContext:
        runAsNonRoot: false  # need root to write into /etc/kubernetes
        runAsUser: 0
      tolerations:
        - operator: Exists
      initContainers:
        - name: install
          image: ghcr.io/aetherizegmbh/harbor-workload-identity-bridge-plugin:0.1.1
          imagePullPolicy: IfNotPresent
          command: [/bin/sh, -c]
          args:
            - |
              set -eu
              echo "installing plugin binary → ${HOST_BIN_DIR}"
              mkdir -p "${HOST_BIN_DIR}"
              cp -f /plugin/harbor-bridge-plugin "${HOST_BIN_DIR}/harbor-bridge-plugin"
              chmod 0755 "${HOST_BIN_DIR}/harbor-bridge-plugin"

              echo "installing kubelet credential-provider-config → ${HOST_CONFIG_DIR}"
              mkdir -p "${HOST_CONFIG_DIR}"
              cp -f /config/credential-provider-config.yaml "${HOST_CONFIG_DIR}/credential-provider-config.yaml"
              chmod 0644 "${HOST_CONFIG_DIR}/credential-provider-config.yaml"

              echo "installing bridge CA → ${HOST_CONFIG_DIR}/harbor-bridge-ca.crt"
              cp -f /tls/ca.crt "${HOST_CONFIG_DIR}/harbor-bridge-ca.crt"
              chmod 0644 "${HOST_CONFIG_DIR}/harbor-bridge-ca.crt"

              echo "installing mTLS client cert → ${HOST_CONFIG_DIR}/harbor-bridge-client.{crt,key}"
              cp -f /mtls/tls.crt "${HOST_CONFIG_DIR}/harbor-bridge-client.crt"
              cp -f /mtls/tls.key "${HOST_CONFIG_DIR}/harbor-bridge-client.key"
              chmod 0644 "${HOST_CONFIG_DIR}/harbor-bridge-client.crt"
              chmod 0600 "${HOST_CONFIG_DIR}/harbor-bridge-client.key"

              # Kubelet only reads --image-credential-provider-* at
              # startup (no hot-reload — DynamicKubeletConfig was
              # removed in 1.26), AND it fails its boot-time check if
              # either path doesn't exist. So we add the flags AFTER
              # the files are in place, then restart kubelet. nsenter
              # runs the patch + restart in the host's namespaces.
              # Idempotency marker: the bin-dir flag already present
              # in /etc/default/kubelet. Skips on every reschedule
              # after the first install so kubelet doesn't churn.
              echo "checking kubelet credential-provider wiring"
              nsenter -t 1 -m -u -i -n -p -- env \
                NODE_BIN_DIR="${HOST_BIN_DIR#/host}" \
                NODE_CONFIG_FILE="${HOST_CONFIG_DIR#/host}/credential-provider-config.yaml" \
                sh -c '
                  set -eu
                  if grep -q image-credential-provider-bin-dir /etc/default/kubelet 2>/dev/null; then
                    echo "kubelet already wired for credential providers; not restarting"
                    exit 0
                  fi
                  echo "writing /etc/default/kubelet and restarting kubelet.service"
                  mkdir -p /etc/default
                  printf "KUBELET_EXTRA_ARGS=\"--image-credential-provider-bin-dir=%s --image-credential-provider-config=%s\"\n" \
                    "${NODE_BIN_DIR}" "${NODE_CONFIG_FILE}" > /etc/default/kubelet
                  systemctl daemon-reload
                  systemctl restart kubelet
                '

              echo "install complete"
          env:
            - name: HOST_BIN_DIR
              value: /host/etc/kubernetes/credential-provider
            - name: HOST_CONFIG_DIR
              value: /host/etc/kubernetes/credential-provider-config
          volumeMounts:
            - name: host-bin
              mountPath: /host/etc/kubernetes/credential-provider
            - name: host-config
              mountPath: /host/etc/kubernetes/credential-provider-config
            - name: kubelet-config
              mountPath: /config
              readOnly: true
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: mtls
              mountPath: /mtls
              readOnly: true
          securityContext:
            # The install container must write into /etc/kubernetes on
            # the host; that requires privileges the main container
            # doesn't need.
            privileged: true
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: pause
          # Keep the DaemonSet "running" after install so `kubectl get
          # ds` shows healthy and `kubectl logs` on this pod surfaces
          # the install output.
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-bin
          hostPath:
            path: /etc/kubernetes/credential-provider
            type: DirectoryOrCreate
        - name: host-config
          hostPath:
            path: /etc/kubernetes/credential-provider-config
            type: DirectoryOrCreate
        - name: kubelet-config
          configMap:
            name: harbor-bridge-plugin
            defaultMode: 0644
        - name: tls
          secret:
            secretName: harbor-bridge-tls
            defaultMode: 0400
            items:
              - key: ca.crt
                path: ca.crt
        - name: mtls
          secret:
            secretName: harbor-bridge-plugin-mtls-client
            defaultMode: 0400

---
# Source: harbor-workload-identity-bridge/templates/bridge-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-bridge
  namespace: harbor-bridge-system
  labels:
    helm.sh/chart: harbor-workload-identity-bridge-0.1.1
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-workload-identity-bridge
      app.kubernetes.io/instance: harbor-bridge
      app.kubernetes.io/component: bridge
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        helm.sh/chart: harbor-workload-identity-bridge-0.1.1
        app.kubernetes.io/version: "0.1.1"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: harbor-workload-identity-bridge
        app.kubernetes.io/name: harbor-workload-identity-bridge
        app.kubernetes.io/instance: harbor-bridge
        app.kubernetes.io/component: bridge
      annotations:
        # Force pod restart on TLS Secret rotation. cert-manager renews
        # the Secret in place; without this annotation the deployment
        # keeps serving the cached cert until the pod is restarted.
        bridge.harbor.aetherize.io/tls-cert-checksum: 3e593f32d31b45ade61d22bea7f40729550c782ba3f3ccca1a81b5ee34277017
    spec:
      serviceAccountName: harbor-bridge
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Soft anti-affinity: prefer spreading replicas across nodes so
      # losing one node doesn't take both bridge pods down.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: harbor-workload-identity-bridge
                    app.kubernetes.io/instance: harbor-bridge
                    app.kubernetes.io/component: bridge
                topologyKey: kubernetes.io/hostname
      containers:
        - name: bridge
          image: ghcr.io/aetherizegmbh/harbor-workload-identity-bridge:0.1.1
          imagePullPolicy: IfNotPresent
          args: []
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: BRIDGE_CLUSTER_NAME
              value: "prod-eu-west"
            - name: BRIDGE_NAMESPACE
              value: "harbor-bridge-system"
            - name: BRIDGE_OIDC_ISSUER
              value: "https://kubernetes.default.svc.cluster.local"
            - name: BRIDGE_OIDC_CA_FILE
              # In-cluster: the OIDC issuer is the apiserver and its
              # cert is signed by the cluster CA. The projected SA
              # volume always carries the cluster CA at this path.
              # Override via .Values.bridge.oidcCAFile to point at a
              # custom CA bundle (e.g. mTLS apiserver topologies).
              value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            - name: BRIDGE_OIDC_TOKEN_FILE
              # The apiserver gates /.well-known/openid-configuration
              # behind system:authenticated; the bridge sends its own
              # SA token as Bearer. Token rotates every ~hour; the
              # transport re-reads on every request.
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
            - name: BRIDGE_HARBOR_URL
              value: "https://harbor.example.com"
            - name: BRIDGE_HARBOR_ADMIN_DIR
              value: /etc/bridge/harbor-admin
            - name: BRIDGE_FORCE_LOCAL_VALIDATION
              value: "true"
            - name: BRIDGE_LOG_LEVEL
              value: "info"
            - name: BRIDGE_TLS_CERT_FILE
              value: /etc/bridge/tls/tls.crt
            - name: BRIDGE_TLS_KEY_FILE
              value: /etc/bridge/tls/tls.key
            - name: BRIDGE_TLS_CLIENT_CA_FILE
              value: /etc/bridge/tls/ca.crt
            - name: BRIDGE_LISTEN_ADDR
              value: ":8443"
            - name: BRIDGE_HEALTH_ADDR
              value: ":8081"
            - name: BRIDGE_ENABLE_LEADER_ELECTION
              value: "true"
          volumeMounts:
            - name: harbor-admin
              mountPath: /etc/bridge/harbor-admin
              readOnly: true
            - name: tls
              mountPath: /etc/bridge/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: harbor-admin
          secret:
            secretName: harbor-admin
            defaultMode: 0400
            items:
              - key: username
                path: username
              - key: password
                path: password
        - name: tls
          secret:
            secretName: harbor-bridge-tls
            defaultMode: 0400

