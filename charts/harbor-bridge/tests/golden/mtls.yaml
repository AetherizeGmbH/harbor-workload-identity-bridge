# Source: harbor-workload-identity-bridge/templates/plugin-serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-bridge-plugin
  namespace: harbor-bridge-system
  labels:
    helm.sh/chart: harbor-workload-identity-bridge-0.1.1
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harbor-workload-identity-bridge
    app.kubernetes.io/name: harbor-workload-identity-bridge
    app.kubernetes.io/instance: harbor-bridge
    app.kubernetes.io/component: plugin
# Plugin pods do not talk to the K8s API — the binary running on the
# node makes a single HTTPS call to the bridge and exits. The SA is
# attached purely so the DaemonSet pod can mount the bridge-tls Secret
# (read-only) to pull ca.crt onto each node.
automountServiceAccountToken: false

