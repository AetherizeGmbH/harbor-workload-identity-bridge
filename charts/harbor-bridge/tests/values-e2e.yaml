# Values for the single-cluster end-to-end test on the tofu-dev kind
# cluster. Uses locally-built images loaded via `kind load`.

clusterName: dev

harbor:
  # In-cluster Service DNS — external harbor.dev.aetherize.com would
  # require either a node-level /etc/hosts override or DNS plumbing in
  # CoreDNS. The in-cluster name resolves natively.
  url: http://harbor-core.harbor.svc.cluster.local
  adminCredsSecret:
    name: harbor-admin

plugin:
  matchImages:
    # tofu-dev kind quirk: containerd runs in each node's host network
    # ns where CoreDNS doesn't apply and ClusterIPs aren't reachable
    # (Cilium kube-proxy replacement without bpf-lb-sock). Traefik's
    # NodePort 30843 IS reachable per-node via /etc/hosts mapping the
    # FQDN to a node IP. Image refs therefore include :30843 so
    # containerd connects to where Traefik actually listens on the
    # node network ns.
    - "harbor.dev.127.0.0.1.nip.io:30843/*"
  audience: harbor-bridge
  image:
    repository: harbor-bridge-plugin
    tag: e2e
    pullPolicy: IfNotPresent

bridge:
  replicas: 1  # kind has limited capacity; single replica is fine for verification
  logLevel: debug
  image:
    repository: harbor-bridge
    tag: e2e
    pullPolicy: IfNotPresent

tls:
  enabled: true
  issuerRef:
    name: harbor-bridge-ca
    kind: ClusterIssuer
