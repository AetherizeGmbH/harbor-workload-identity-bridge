---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: harboraccesses.harbor.aetherize.io
spec:
  group: harbor.aetherize.io
  names:
    categories:
    - harbor
    kind: HarborAccess
    listKind: HarborAccessList
    plural: harboraccesses
    shortNames:
    - ha
    singular: harboraccess
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.trustPolicy.subjectMatch
      name: Subject
      type: string
    - jsonPath: .status.robot.name
      name: Robot
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.trustPolicyEnforcedBy
      name: Enforced-By
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HarborAccess declares that a Kubernetes ServiceAccount, matched by trustPolicy,
          may pull and/or push specific Harbor projects via the bridge.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HarborAccessSpec describes the desired state of a HarborAccess.
            properties:
              permissions:
                description: |-
                  Permissions are the Harbor project permissions granted to the resulting
                  Harbor robot account. See docs/adr/0003-persistent-robots-per-harboraccess.md.
                items:
                  description: ProjectPermission grants an action on a single Harbor
                    project.
                  properties:
                    action:
                      description: Action is the permission granted on the project.
                      enum:
                      - pull
                      - push
                      - pull,push
                      type: string
                    project:
                      description: Project is the Harbor project name (case-sensitive,
                        no leading slash).
                      maxLength: 255
                      minLength: 1
                      type: string
                  required:
                  - action
                  - project
                  type: object
                minItems: 1
                type: array
              tokenTTL:
                default: 1h
                description: |-
                  TokenTTL bounds how long a docker token issued via this HarborAccess lives.
                  Min 5m, max 24h. Defaults to 1h.
                format: duration
                type: string
                x-kubernetes-validations:
                - message: tokenTTL must be between 5m and 24h
                  rule: duration(self) >= duration('5m') && duration(self) <= duration('24h')
              trustPolicy:
                description: TrustPolicy declares which SA tokens may receive credentials
                  via this CR.
                properties:
                  audience:
                    description: |-
                      Audience must appear in the aud claim of incoming SA tokens. Must match the
                      kubelet credential-provider config's serviceAccountTokenAudience for the
                      registry hostname being authenticated.
                    minLength: 1
                    type: string
                  issuer:
                    description: |-
                      Issuer is the OIDC issuer expected on incoming service-account tokens.
                      Typically the cluster service-account issuer, e.g. https://kubernetes.default.svc.
                    minLength: 1
                    pattern: ^https?://.+
                    type: string
                  subjectMatch:
                    description: |-
                      SubjectMatch is the exact sub claim required on incoming SA tokens.
                      For Kubernetes SA tokens this looks like system:serviceaccount:<ns>:<sa>.
                      v1alpha1 supports exact match only; wildcards and claim matchers are
                      reserved for future versions (see docs/adr/0006-oidc-validation-and-audience.md).
                    minLength: 1
                    type: string
                required:
                - audience
                - issuer
                - subjectMatch
                type: object
            required:
            - permissions
            - trustPolicy
            type: object
          status:
            description: HarborAccessStatus is the observed state of a HarborAccess.
            properties:
              conditions:
                description: |-
                  Conditions follow the Kubernetes standard pattern. Expected types:
                  Ready, RobotProvisioned, TrustPolicyApplied.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the metadata.generation of the most recently
                  reconciled spec.
                format: int64
                type: integer
              robot:
                description: |-
                  Robot reports the Harbor robot provisioned for this CR. Empty until the
                  first reconcile succeeds.
                properties:
                  id:
                    description: ID is the Harbor numeric ID of the robot.
                    format: int64
                    type: integer
                  lastRotated:
                    description: LastRotated is the timestamp of the last successful
                      password rotation.
                    format: date-time
                    type: string
                  name:
                    description: Name is the Harbor robot name (typically bridge-<namespace>-<serviceaccount>).
                    type: string
                  passwordSecretRef:
                    description: |-
                      PasswordSecretRef is the Kubernetes Secret name holding the robot password.
                      The Secret lives in the bridge's namespace, not the HarborAccess namespace,
                      so a workload SA cannot read it.
                    type: string
                type: object
              trustPolicyEnforcedBy:
                description: |-
                  TrustPolicyEnforcedBy reports who currently enforces the trust policy
                  (see docs/adr/0004-trust-policy-as-crd-field.md and docs/MIGRATION.md).
                enum:
                - bridge
                - harbor
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
