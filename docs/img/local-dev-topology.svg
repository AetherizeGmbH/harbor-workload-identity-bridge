<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" width="1280" height="880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <rect width="1280" height="880" fill="#ffffff"/>
  <style>
    .title { fill: #0f172a; font-weight: 700; font-size: 16px; }
    .lbl   { fill: #0f172a; font-weight: 600; }
    .sub   { fill: #475569; font-size: 11px; }
    .note  { fill: #334155; font-size: 11px; font-style: italic; }
    .stepBox { fill: #ffffff; stroke: #2563eb; stroke-width: 1.5; }
    .stepBoxK { fill: #ffffff; stroke: #047857; stroke-width: 1.5; }
    .stepBoxR { fill: #ffffff; stroke: #be123c; stroke-width: 1.5; }
    .step  { fill: #2563eb; font-weight: 700; font-size: 12px; }
    .stepR { fill: #be123c; font-weight: 700; font-size: 12px; }
    .stepM { fill: #047857; font-weight: 700; font-size: 12px; }
    .mono  { font-family: 'SF Mono', ui-monospace, Menlo, monospace; fill: #0f172a; font-size: 11px; }

    .laptop  { fill: #f8fafc; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 6 4; }
    .kind    { fill: #f8fafc; stroke: #047857; stroke-width: 1.8; stroke-dasharray: 6 4; }
    .harborZ { fill: #f8fafc; stroke: #be123c; stroke-width: 1.8; stroke-dasharray: 6 4; }
    .box     { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .ours    { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }

    .arrow      { stroke: #475569; stroke-width: 1.6; fill: none; }
    .arrow-emph { stroke: #2563eb; stroke-width: 1.8; fill: none; }
    .arrow-kind { stroke: #047857; stroke-width: 1.6; fill: none; }
    .arrow-harb { stroke: #be123c; stroke-width: 1.6; fill: none; }
  </style>
  <defs>
    <marker id="head-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="head-kind" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#047857"/>
    </marker>
    <marker id="head-harb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#be123c"/>
    </marker>
  </defs>

  <text x="640" y="32" text-anchor="middle" class="title">Local-dev test topology</text>
  <text x="640" y="52" text-anchor="middle" class="sub">Where the bridge process actually runs during the manual test, and which network paths the bytes take.</text>
  <text x="640" y="68" text-anchor="middle" class="sub">For Phase 6 e2e the bridge will run inside the cluster as a Deployment; for this test it runs on your laptop pointed at kind via kubeconfig.</text>

  <!-- LAPTOP ZONE -->
  <rect class="laptop" x="20" y="100" width="540" height="640" rx="10"/>
  <text x="290" y="124" text-anchor="middle" class="lbl">Your laptop</text>

  <!-- Your terminal -->
  <rect class="box" x="40" y="160" width="180" height="80" rx="6"/>
  <text x="130" y="184" text-anchor="middle" class="lbl">Your terminal</text>
  <text x="130" y="202" text-anchor="middle" class="sub">kubectl, curl, crane,</text>
  <text x="130" y="218" text-anchor="middle" class="sub">make run-local,</text>
  <text x="130" y="234" text-anchor="middle" class="sub">make proxy</text>

  <!-- kubectl proxy -->
  <rect class="box" x="380" y="160" width="160" height="80" rx="6"/>
  <text x="460" y="184" text-anchor="middle" class="lbl">kubectl proxy</text>
  <text x="460" y="202" text-anchor="middle" class="sub">localhost:8001 (HTTP)</text>
  <text x="460" y="218" text-anchor="middle" class="sub">uses ~/.kube/config</text>
  <text x="460" y="234" text-anchor="middle" class="sub">to talk to apiserver</text>

  <!-- bridge process -->
  <rect class="ours" x="40" y="340" width="500" height="220" rx="6"/>
  <text x="290" y="366" text-anchor="middle" class="lbl">bridge process (this project) — `make run-local`</text>
  <text x="290" y="384" text-anchor="middle" class="sub">listens on :8443 (HTTPS, self-signed cert in /tmp/bridge-tls)</text>
  <text x="60" y="412" class="mono">BRIDGE_OIDC_ISSUER      = https://kubernetes.default.svc.cluster.local</text>
  <text x="60" y="430" class="mono">BRIDGE_OIDC_JWKS_URL    = http://127.0.0.1:8001/openid/v1/jwks</text>
  <text x="60" y="448" class="mono">BRIDGE_HARBOR_URL       = https://harbor.dev.127.0.0.1.nip.io:8443</text>
  <text x="60" y="466" class="mono">BRIDGE_HARBOR_ADMIN_DIR = /tmp/harbor-admin</text>
  <text x="60" y="484" class="mono">BRIDGE_CLUSTER_NAME     = dev</text>
  <text x="60" y="502" class="mono">BRIDGE_NAMESPACE        = harbor-bridge-system</text>
  <text x="60" y="528" class="note">controller-runtime Manager + HTTPS server + OIDC validator, one process.</text>
  <text x="60" y="546" class="note">~/.kube/config is read directly by controller-runtime, not via the proxy.</text>

  <!-- Notes inside laptop, well below the bridge box -->
  <text x="40" y="590" class="note">The proxy exists because go-oidc's JWKS fetch is plain HTTP, and the cluster-internal</text>
  <text x="40" y="606" class="note">hostname (kubernetes.default.svc.cluster.local) does not resolve on your laptop.</text>
  <text x="40" y="622" class="note">controller-runtime's Kubernetes client resolves and authenticates the API host on</text>
  <text x="40" y="638" class="note">its own — that path does NOT route through the proxy. Only the JWKS fetch does.</text>

  <!-- KIND ZONE -->
  <rect class="kind" x="620" y="100" width="340" height="640" rx="10"/>
  <text x="790" y="124" text-anchor="middle" class="lbl">kind cluster</text>
  <text x="790" y="140" text-anchor="middle" class="sub">runs inside a Docker container on your laptop</text>

  <rect class="box" x="640" y="180" width="300" height="90" rx="6"/>
  <text x="790" y="206" text-anchor="middle" class="lbl">kube-apiserver</text>
  <text x="790" y="224" text-anchor="middle" class="sub">issues SA tokens</text>
  <text x="790" y="240" text-anchor="middle" class="sub">serves CRDs, Secrets,</text>
  <text x="790" y="256" text-anchor="middle" class="sub">/openid/v1/jwks (authenticated)</text>

  <rect class="box" x="640" y="340" width="300" height="90" rx="6"/>
  <text x="790" y="366" text-anchor="middle" class="lbl">HarborAccess CR + robot Secret</text>
  <text x="790" y="384" text-anchor="middle" class="sub">CR applied by you,</text>
  <text x="790" y="400" text-anchor="middle" class="sub">reconciled by the bridge,</text>
  <text x="790" y="416" text-anchor="middle" class="sub">stored in harbor-bridge-system ns</text>

  <rect class="box" x="640" y="500" width="300" height="90" rx="6"/>
  <text x="790" y="526" text-anchor="middle" class="lbl">test ServiceAccount</text>
  <text x="790" y="544" text-anchor="middle" class="sub">test-pull/image-puller</text>
  <text x="790" y="560" text-anchor="middle" class="sub">`kubectl create token --audience=...`</text>
  <text x="790" y="576" text-anchor="middle" class="sub">mints audience-scoped SA tokens here</text>

  <!-- HARBOR ZONE -->
  <rect class="harborZ" x="1000" y="100" width="240" height="640" rx="10"/>
  <text x="1120" y="124" text-anchor="middle" class="lbl">Harbor</text>
  <text x="1120" y="140" text-anchor="middle" class="sub">your existing install</text>

  <rect class="box" x="1020" y="200" width="200" height="100" rx="6"/>
  <text x="1120" y="226" text-anchor="middle" class="lbl">API + robot accounts</text>
  <text x="1120" y="244" text-anchor="middle" class="sub">/api/v2.0/robots</text>
  <text x="1120" y="262" text-anchor="middle" class="sub">CRUD via admin Basic Auth</text>
  <text x="1120" y="278" text-anchor="middle" class="sub">(BRIDGE_HARBOR_ADMIN_DIR)</text>

  <rect class="box" x="1020" y="420" width="200" height="100" rx="6"/>
  <text x="1120" y="446" text-anchor="middle" class="lbl">registry v2 endpoint</text>
  <text x="1120" y="464" text-anchor="middle" class="sub">/v2/* and /service/token</text>
  <text x="1120" y="482" text-anchor="middle" class="sub">consumes the robot's</text>
  <text x="1120" y="498" text-anchor="middle" class="sub">Basic Auth (ADR-0013)</text>

  <!-- ===== ARROWS ===== -->
  <!-- Numbered step labels are placed in a small white "pill" so they remain
       readable even when they sit on top of zone backgrounds or arrow lines. -->

  <!-- 1: bridge -> proxy (JWKS) — vertical arrow up from bridge to proxy -->
  <path class="arrow-emph" d="M 460 340 L 460 240" marker-end="url(#head-blue)"/>
  <rect class="stepBox" x="466" y="276" width="100" height="34" rx="4"/>
  <text x="476" y="290" class="step">1</text>
  <text x="488" y="290" class="sub">JWKS fetch</text>
  <text x="488" y="304" class="sub">via proxy (HTTP)</text>

  <!-- 2: proxy -> apiserver (forwards) — short horizontal across zone gap -->
  <path class="arrow-kind" d="M 540 200 L 640 215" marker-end="url(#head-kind)"/>
  <rect class="stepBoxK" x="548" y="166" width="86" height="20" rx="4"/>
  <text x="556" y="180" class="stepM">2</text>
  <text x="568" y="180" class="sub">proxy forwards</text>

  <!-- 3: bridge -> apiserver direct (controller-runtime) -->
  <path class="arrow-kind" d="M 540 370 L 640 370" marker-end="url(#head-kind)"/>
  <rect class="stepBoxK" x="548" y="306" width="86" height="38" rx="4"/>
  <text x="556" y="320" class="stepM">3</text>
  <text x="568" y="320" class="sub">CR watch +</text>
  <text x="568" y="334" class="sub">Secret R/W</text>

  <!-- 4: bridge -> harbor (admin) -->
  <path class="arrow-harb" d="M 540 470 C 740 540, 980 360, 1020 270" marker-end="url(#head-harb)"/>
  <rect class="stepBoxR" x="734" y="540" width="160" height="20" rx="4"/>
  <text x="742" y="554" class="stepR">4</text>
  <text x="754" y="554" class="sub">robot CRUD (admin Basic Auth)</text>

  <!-- 5: terminal -> apiserver (kubectl create token) -->
  <path class="arrow-kind" d="M 220 195 C 380 80, 580 120, 640 200" marker-end="url(#head-kind)"/>
  <rect class="stepBoxK" x="320" y="78" width="240" height="20" rx="4"/>
  <text x="328" y="92" class="stepM">5</text>
  <text x="340" y="92" class="sub">kubectl create token --audience=harbor-bridge</text>

  <!-- 6: terminal -> bridge -->
  <path class="arrow-emph" d="M 130 240 L 130 340" marker-end="url(#head-blue)"/>
  <rect class="stepBox" x="144" y="266" width="180" height="38" rx="4"/>
  <text x="152" y="280" class="step">6</text>
  <text x="164" y="280" class="sub">curl POST /v1/credentials</text>
  <text x="164" y="294" class="sub">Authorization: Bearer &lt;SA token&gt;</text>

  <!-- 7: terminal -> harbor (crane pull) -->
  <path class="arrow-harb" d="M 220 220 C 600 800, 1100 800, 1120 520" marker-end="url(#head-harb)"/>
  <rect class="stepBoxR" x="450" y="788" width="380" height="20" rx="4"/>
  <text x="458" y="802" class="stepR">7</text>
  <text x="470" y="802" class="sub">crane pull (ADR-0013 acid test): user+pass from step 6 → image</text>

  <!-- LEGEND (bottom strip) -->
  <rect class="laptop" x="20" y="848" width="14" height="14" rx="2"/>
  <text x="42" y="860" class="sub">your laptop</text>
  <rect class="kind" x="140" y="848" width="14" height="14" rx="2"/>
  <text x="162" y="860" class="sub">kind cluster (Docker)</text>
  <rect class="harborZ" x="310" y="848" width="14" height="14" rx="2"/>
  <text x="332" y="860" class="sub">Harbor</text>
  <rect class="ours" x="410" y="848" width="14" height="14" rx="2"/>
  <text x="432" y="860" class="sub">our component</text>
  <line x1="540" y1="855" x2="590" y2="855" class="arrow-emph"/>
  <text x="600" y="860" class="sub">data-plane (HTTP)</text>
  <line x1="720" y1="855" x2="770" y2="855" class="arrow-kind"/>
  <text x="780" y="860" class="sub">kind apiserver</text>
  <line x1="900" y1="855" x2="950" y2="855" class="arrow-harb"/>
  <text x="960" y="860" class="sub">Harbor</text>
</svg>
