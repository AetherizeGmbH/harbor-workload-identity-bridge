<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <rect width="920" height="520" fill="#ffffff"/>
  <style>
    .lbl   { fill: #0f172a; font-weight: 600; }
    .sub   { fill: #475569; font-size: 11px; }
    .step  { fill: #2563eb; font-weight: 700; font-size: 11px; }
    .note  { fill: #334155; font-size: 11px; font-style: italic; }
    .box   { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .ours  { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
    .arrow { stroke: #475569; stroke-width: 1.6; fill: none; }
    .arrow-emph { stroke: #2563eb; stroke-width: 1.8; fill: none; }
  </style>

  <defs>
    <marker id="head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="head-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" class="lbl" font-size="15">Credential issuance — one image pull, end to end</text>

  <!-- Boxes -->
  <g>
    <rect class="box" x="20"  y="60" width="140" height="60" rx="6"/>
    <text x="90" y="86" text-anchor="middle" class="lbl">Pod</text>
    <text x="90" y="104" text-anchor="middle" class="sub">starts; image needed</text>

    <rect class="box" x="190" y="60" width="140" height="60" rx="6"/>
    <text x="260" y="86" text-anchor="middle" class="lbl">Kubelet</text>
    <text x="260" y="104" text-anchor="middle" class="sub">projects SA token (aud=registry)</text>

    <rect class="box" x="360" y="60" width="140" height="60" rx="6"/>
    <text x="430" y="86" text-anchor="middle" class="lbl">Plugin (KEP-4412)</text>
    <text x="430" y="104" text-anchor="middle" class="sub">stdin/stdout exec'd by kubelet</text>

    <rect class="ours" x="530" y="60" width="160" height="60" rx="6"/>
    <text x="610" y="86" text-anchor="middle" class="lbl">Bridge (this project)</text>
    <text x="610" y="104" text-anchor="middle" class="sub">HTTPS, per-cluster</text>

    <rect class="box" x="720" y="60" width="180" height="60" rx="6"/>
    <text x="810" y="86" text-anchor="middle" class="lbl">Harbor</text>
    <text x="810" y="104" text-anchor="middle" class="sub">registry, robot accounts</text>
  </g>

  <!-- Step 1: kubelet -> plugin -->
  <path class="arrow" d="M 330 130 C 330 165, 360 165, 360 135" marker-end="url(#head)"/>
  <text x="345" y="160" text-anchor="middle" class="step">1</text>
  <text x="345" y="178" text-anchor="middle" class="sub">exec; stdin =</text>
  <text x="345" y="192" text-anchor="middle" class="sub">{image, SA token}</text>

  <!-- Step 2: plugin -> bridge -->
  <path class="arrow-emph" d="M 500 90 L 530 90" marker-end="url(#head-blue)"/>
  <text x="515" y="80" text-anchor="middle" class="step">2</text>
  <text x="515" y="135" text-anchor="middle" class="sub">POST /v1/credentials</text>
  <text x="515" y="148" text-anchor="middle" class="sub">Authorization: Bearer &lt;SA token&gt;</text>

  <!-- Bridge internals box -->
  <rect class="ours" x="500" y="210" width="220" height="170" rx="6"/>
  <text x="610" y="232" text-anchor="middle" class="lbl">Bridge internals</text>
  <text x="610" y="252" text-anchor="middle" class="sub">a. Validate SA token (OIDC)</text>
  <text x="610" y="268" text-anchor="middle" class="sub">b. List HarborAccess CRs</text>
  <text x="610" y="284" text-anchor="middle" class="sub">c. Match sub + aud</text>
  <text x="610" y="300" text-anchor="middle" class="sub">d. Read robot Secret from</text>
  <text x="610" y="314" text-anchor="middle" class="sub">    bridge namespace</text>
  <text x="610" y="338" text-anchor="middle" class="note">workloads cannot read</text>
  <text x="610" y="352" text-anchor="middle" class="note">this Secret (ADR-0011)</text>

  <!-- Arrow bridge -> internals -->
  <path class="arrow-emph" d="M 610 120 L 610 210" marker-end="url(#head-blue)"/>

  <!-- Step 3: response back to plugin -->
  <path class="arrow-emph" d="M 530 105 L 500 105" marker-end="url(#head-blue)"/>
  <text x="515" y="120" text-anchor="middle" class="step">3</text>
  <text x="515" y="200" text-anchor="middle" class="sub">200 OK</text>
  <text x="515" y="170" text-anchor="middle" class="sub">{robot user, robot pass,</text>
  <text x="515" y="184" text-anchor="middle" class="sub">expires_in, cache_key_type}</text>

  <!-- Step 4: plugin -> kubelet stdout -->
  <path class="arrow" d="M 360 135 C 360 165, 330 165, 330 130" marker-end="url(#head)"/>
  <text x="395" y="225" text-anchor="start" class="step">4</text>
  <text x="395" y="241" text-anchor="start" class="sub">stdout = CredentialProviderResponse</text>
  <text x="395" y="255" text-anchor="start" class="sub">cacheKeyType: ServiceAccount</text>

  <!-- Lower row: containerd pull -->
  <rect class="box" x="190" y="400" width="140" height="60" rx="6"/>
  <text x="260" y="426" text-anchor="middle" class="lbl">Kubelet → Containerd</text>
  <text x="260" y="444" text-anchor="middle" class="sub">Basic Auth = {user, pass}</text>

  <rect class="box" x="720" y="400" width="180" height="60" rx="6"/>
  <text x="810" y="426" text-anchor="middle" class="lbl">Harbor</text>
  <text x="810" y="444" text-anchor="middle" class="sub">registry v2 + /service/token</text>

  <!-- Step 5: containerd -> harbor -->
  <path class="arrow" d="M 330 430 L 720 430" marker-end="url(#head)"/>
  <text x="525" y="420" text-anchor="middle" class="step">5</text>
  <text x="525" y="450" text-anchor="middle" class="sub">standard registry v2 handshake</text>
  <text x="525" y="464" text-anchor="middle" class="sub">401 → Basic Auth → scoped JWT → pull</text>

  <!-- Step 0: pod -> kubelet -->
  <path class="arrow" d="M 160 90 L 190 90" marker-end="url(#head)"/>
  <text x="175" y="82" text-anchor="middle" class="step">0</text>

  <!-- Bottom legend -->
  <rect class="ours" x="20" y="490" width="14" height="14" rx="2"/>
  <text x="42" y="502" class="sub">our components</text>
  <rect class="box" x="160" y="490" width="14" height="14" rx="2"/>
  <text x="182" y="502" class="sub">existing components</text>
  <text x="370" y="502" class="note">ADR-0013: containerd handles step 5 itself; the bridge does not pre-mint JWTs</text>
</svg>
