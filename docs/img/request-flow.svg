<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <rect width="1100" height="700" fill="#ffffff"/>
  <style>
    .title { fill: #0f172a; font-weight: 700; font-size: 16px; }
    .lbl   { fill: #0f172a; font-weight: 600; }
    .sub   { fill: #475569; font-size: 11px; }
    .step  { fill: #2563eb; font-weight: 700; font-size: 12px; }
    .note  { fill: #334155; font-size: 11px; font-style: italic; }
    .lifeline { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 3; }
    .actor   { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .ours    { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
    .arrow      { stroke: #475569; stroke-width: 1.6; fill: none; }
    .arrow-emph { stroke: #2563eb; stroke-width: 1.8; fill: none; }
  </style>
  <defs>
    <marker id="head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="head-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" class="title">Credential issuance — one image pull, end to end</text>

  <!-- Actor heads (5 columns at fixed x) -->
  <g>
    <rect class="actor" x="40"  y="55" width="140" height="50" rx="6"/>
    <text x="110" y="78" text-anchor="middle" class="lbl">Pod</text>
    <text x="110" y="94" text-anchor="middle" class="sub">starts; needs image</text>

    <rect class="actor" x="240" y="55" width="140" height="50" rx="6"/>
    <text x="310" y="78" text-anchor="middle" class="lbl">Kubelet</text>
    <text x="310" y="94" text-anchor="middle" class="sub">projects SA token</text>

    <rect class="actor" x="440" y="55" width="140" height="50" rx="6"/>
    <text x="510" y="78" text-anchor="middle" class="lbl">Plugin</text>
    <text x="510" y="94" text-anchor="middle" class="sub">KEP-4412 stdin/stdout</text>

    <rect class="ours"  x="640" y="55" width="160" height="50" rx="6"/>
    <text x="720" y="78" text-anchor="middle" class="lbl">Bridge</text>
    <text x="720" y="94" text-anchor="middle" class="sub">HTTPS, per cluster</text>

    <rect class="actor" x="860" y="55" width="180" height="50" rx="6"/>
    <text x="950" y="78" text-anchor="middle" class="lbl">Harbor</text>
    <text x="950" y="94" text-anchor="middle" class="sub">registry, robot accounts</text>
  </g>

  <!-- Lifelines (vertical dashed) -->
  <line class="lifeline" x1="110" y1="105" x2="110" y2="640"/>
  <line class="lifeline" x1="310" y1="105" x2="310" y2="640"/>
  <line class="lifeline" x1="510" y1="105" x2="510" y2="640"/>
  <line class="lifeline" x1="720" y1="105" x2="720" y2="640"/>
  <line class="lifeline" x1="950" y1="105" x2="950" y2="640"/>

  <!-- Step 1: Pod -> Kubelet (image needed) -->
  <path class="arrow" d="M 110 145 L 310 145" marker-end="url(#head)"/>
  <text x="115" y="138" class="step">1</text>
  <text x="135" y="138" class="sub">pod start; container image to pull</text>

  <!-- Step 2: Kubelet exec plugin -->
  <path class="arrow" d="M 310 195 L 510 195" marker-end="url(#head)"/>
  <text x="315" y="188" class="step">2</text>
  <text x="335" y="188" class="sub">exec plugin; stdin = { image, serviceAccountToken }</text>

  <!-- Step 3: Plugin -> Bridge -->
  <path class="arrow-emph" d="M 510 245 L 720 245" marker-end="url(#head-blue)"/>
  <text x="515" y="238" class="step">3</text>
  <text x="535" y="238" class="sub">POST /v1/credentials, Authorization: Bearer &lt;SA token&gt;</text>

  <!-- Step 4: Bridge self-loop (validate, list, match, read Secret) -->
  <path class="arrow-emph" d="M 720 275 C 790 275, 790 365, 720 365" marker-end="url(#head-blue)"/>
  <text x="725" y="298" class="step">4</text>
  <text x="800" y="298" class="sub">a. validate SA token (OIDC)</text>
  <text x="800" y="314" class="sub">b. list HarborAccess CRs</text>
  <text x="800" y="330" class="sub">c. match sub + aud</text>
  <text x="800" y="346" class="sub">d. read robot Secret (bridge ns)</text>
  <text x="800" y="362" class="note">workloads cannot read this Secret (ADR-0011)</text>

  <!-- Step 5: Bridge -> Plugin response -->
  <path class="arrow-emph" d="M 720 410 L 510 410" marker-end="url(#head-blue)"/>
  <text x="515" y="403" class="step">5</text>
  <text x="535" y="403" class="sub">200 OK: { username, password, expires_in, cache_key_type }</text>

  <!-- Step 6: Plugin -> Kubelet stdout -->
  <path class="arrow" d="M 510 455 L 310 455" marker-end="url(#head)"/>
  <text x="315" y="448" class="step">6</text>
  <text x="335" y="448" class="sub">stdout = CredentialProviderResponse</text>

  <!-- Step 7: Kubelet -> Containerd -> Harbor -->
  <path class="arrow" d="M 310 510 L 950 510" marker-end="url(#head)"/>
  <text x="315" y="500" class="step">7</text>
  <text x="335" y="500" class="sub">kubelet hands creds to containerd</text>
  <text x="630" y="528" text-anchor="middle" class="sub">containerd does the registry v2 handshake itself:</text>
  <text x="630" y="544" text-anchor="middle" class="sub">401 → Bearer realm → POST /service/token with Basic Auth → scoped JWT → /v2/ pull</text>

  <!-- Step 8: pod has image -->
  <path class="arrow" d="M 310 600 L 110 600" marker-end="url(#head)"/>
  <text x="115" y="593" class="step">8</text>
  <text x="135" y="593" class="sub">image landed; pod runs</text>

  <!-- ADR-0013 footer note -->
  <text x="550" y="668" text-anchor="middle" class="note">ADR-0013: the bridge does NOT pre-mint JWTs; step 7 is containerd's normal flow against any registry.</text>

  <!-- Legend -->
  <rect class="ours"  x="40" y="685" width="14" height="14" rx="2"/>
  <text x="62" y="697" class="sub">our component</text>
  <rect class="actor" x="200" y="685" width="14" height="14" rx="2"/>
  <text x="222" y="697" class="sub">existing components</text>
  <line x1="380" y1="692" x2="430" y2="692" class="arrow-emph"/>
  <text x="440" y="697" class="sub">credential-issuance flow</text>
  <line x1="640" y1="692" x2="690" y2="692" class="arrow"/>
  <text x="700" y="697" class="sub">other flows</text>
</svg>
